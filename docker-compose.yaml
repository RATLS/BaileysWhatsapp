services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --timeout 0
      --tcp-keepalive 60
      --maxclients 100
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  worker:
    build: ./worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WA_DEVICE_NAME: "Admissions - CRM"
      WA_DEVICE_PLATFORM: "Linux"
      WA_DEVICE_VERSION: "120.0.0"
    volumes:
      - ./sessions:/sessions
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    build: ./api
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
